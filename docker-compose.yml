services:
  db:
    image: postgres:16-alpine
    container_name: nha-tro-db
    environment:
      POSTGRES_DB: nhatro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nhatro"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nha-tro-backend
    environment:
      - DEBUG=False
      - SECRET_KEY=django-docker-secret-key-123456789
      - DATABASE_URL=postgresql://postgres:password123@db:5432/nhatro
      - ALLOWED_HOSTS=*
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nha-tro-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
